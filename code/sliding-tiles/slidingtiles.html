<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Sliding Tiles - Reverse Engineer Demo</title>
        <style>
            body {
                background-color: #1e1e1e;
                color: #00ff00;
                font-family: "Courier New", Courier, monospace;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
            }
            #game-container {
                background: #000;
                padding: 25px;
                border: 3px solid #444;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
                text-align: center;
            }
            pre {
                line-height: 1.1;
                font-weight: bold;
                font-size: 1.2rem;
                margin: 10px 0;
            }
            .controls-ui {
                background: #111;
                padding: 10px;
                border: 1px solid #333;
                display: inline-block;
                margin-top: 10px;
                min-width: 200px;
            }
            .key-row {
                height: 25px;
                display: flex;
                justify-content: center;
                align-items: center;
                letter-spacing: 5px;
            }
            .win {
                color: #fff;
                background: #228b22;
                padding: 10px;
                margin-bottom: 10px;
                font-weight: bold;
            }
            b {
                color: #fff;
            }
            .info {
                margin-top: 15px;
                color: #888;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <div id="game-container">
            <div id="win-message" class="win" style="display: none">
                🎉 PUZZLE SOLVED!
            </div>

            <pre id="board-display">Loading...</pre>

            <div class="controls-ui">
                <div
                    id="move-label"
                    style="color: #888; font-size: 0.8rem; margin-bottom: 5px"
                >
                    MOVE 1
                </div>
                <div class="key-row" id="row-up"></div>
                <div class="key-row" id="row-main"></div>
            </div>

            <div class="info">
                Press <b>R</b> to Rescramble | <b>Q</b> to Quit
            </div>
        </div>

        <script>
            const BLANK = "  ";
            let board = [];
            let moveCount = 1;
            let gameActive = true;

            function getNewBoard() {
                return [
                    ["1 ", "5 ", "9 ", "13"],
                    ["2 ", "6 ", "10", "14"],
                    ["3 ", "7 ", "11", "15"],
                    ["4 ", "8 ", "12", BLANK],
                ];
            }

            function findBlank() {
                for (let x = 0; x < 4; x++) {
                    for (let y = 0; y < 4; y++) {
                        if (board[x][y] === BLANK) return { x, y };
                    }
                }
            }

            function updateControls() {
                const { x, y } = findBlank();
                const w = y !== 3 ? "W" : " ";
                const a = x !== 3 ? "A" : " ";
                const s = y !== 0 ? "S" : " ";
                const d = x !== 0 ? "D" : " ";

                document.getElementById("row-up").textContent = `(${w})`;
                document.getElementById("row-main").textContent =
                    `(${a}) (${s}) (${d})`;
                document.getElementById("move-label").textContent =
                    `MOVE ${moveCount}`;
            }

            function makeMove(dir, silent = false) {
                const { x, y } = findBlank();
                let tx = x,
                    ty = y;

                if (dir === "W" && y < 3) ty++;
                else if (dir === "A" && x < 3) tx++;
                else if (dir === "S" && y > 0) ty--;
                else if (dir === "D" && x > 0) tx--;
                else return false;

                [board[x][y], board[tx][ty]] = [board[tx][ty], board[x][y]];

                if (!silent) {
                    moveCount++;
                    checkWin();
                    render();
                }
                return true;
            }

            function checkWin() {
                const solved = JSON.stringify(getNewBoard());
                if (JSON.stringify(board) === solved) {
                    gameActive = false;
                    document.getElementById("win-message").style.display =
                        "block";
                }
            }

            function scramble() {
                board = getNewBoard();
                let count = 0;
                while (count < 200) {
                    const dirs = ["W", "A", "S", "D"];
                    if (makeMove(dirs[Math.floor(Math.random() * 4)], true)) {
                        count++;
                    }
                }
                moveCount = 1;
                gameActive = true;
                document.getElementById("win-message").style.display = "none";
                render();
            }

            function render() {
                const b = board;
                const display = `
+------+------+------+------+
|      |      |      |      |
|  ${b[0][0]}  |  ${b[1][0]}  |  ${b[2][0]}  |  ${b[3][0]}  |
|      |      |      |      |
+------+------+------+------+
|      |      |      |      |
|  ${b[0][1]}  |  ${b[1][1]}  |  ${b[2][1]}  |  ${b[3][1]}  |
|      |      |      |      |
+------+------+------+------+
|      |      |      |      |
|  ${b[0][2]}  |  ${b[1][2]}  |  ${b[2][2]}  |  ${b[3][2]}  |
|      |      |      |      |
+------+------+------+------+
|      |      |      |      |
|  ${b[0][3]}  |  ${b[1][3]}  |  ${b[2][3]}  |  ${b[3][3]}  |
|      |      |      |      |
+------+------+------+------+`;
                document.getElementById("board-display").textContent = display;
                updateControls();
            }

            window.addEventListener("keydown", (e) => {
                const key = e.key.toUpperCase();
                if (gameActive && ["W", "A", "S", "D"].includes(key))
                    makeMove(key);
                if (key === "R") scramble();
                if (key === "Q") window.close(); // Note: browsers may block self-closing
            });

            scramble();
        </script>
    </body>
</html>
